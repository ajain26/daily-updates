<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Updates — Tech Trends Dashboard</title>
  <meta name="description" content="Your daily digest of the latest AI tools, apps, and tech trends" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Ambient background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <div class="brand">
          <span class="brand-icon">⚡</span>
          <h1>Daily Updates</h1>
        </div>
        <div class="live-indicator" id="liveIndicator" title="Auto-refresh active">
          <span class="live-dot"></span>
          <span>LIVE</span>
        </div>
      </div>

      <!-- Date Navigator -->
      <div class="date-nav">
        <button class="date-btn" id="prevDate" aria-label="Previous day">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="date-display" id="dateDisplay">
          <span class="date-label" id="dateLabel">Today</span>
          <span class="date-full" id="dateFull">March 5, 2026</span>
        </div>
        <button class="date-btn" id="nextDate" aria-label="Next day">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>

      <!-- Search -->
      <div class="search-wrap">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search tools & apps..." autocomplete="off" />
      </div>

      <!-- Category Filters -->
      <div class="filters" id="filters">
        <button class="filter-pill active" data-category="all">All</button>
        <button class="filter-pill" data-category="ai-productivity">🧠 AI Productivity</button>
        <button class="filter-pill" data-category="ai-coding">💻 AI Coding</button>
        <button class="filter-pill" data-category="ai-image-video">🎨 AI Image/Video</button>
        <button class="filter-pill" data-category="ai-chatbot">💬 AI Chatbot</button>
        <button class="filter-pill" data-category="web-app">🌐 Web App</button>
        <button class="filter-pill" data-category="mobile-app">📱 Mobile App</button>
      </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar" id="statsBar">
      <div class="stat">
        <span class="stat-value" id="totalCount">0</span>
        <span class="stat-label">Tools</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="freeCount">0</span>
        <span class="stat-label">Free</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="trendingCount">0</span>
        <span class="stat-label">Trending</span>
      </div>
    </div>

    <!-- Cards Grid -->
    <main class="cards-grid" id="cardsGrid">
      <!-- Cards rendered by JS -->
    </main>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">📭</div>
      <h2>No updates for this date</h2>
      <p>Check back tomorrow or browse a different day</p>
    </div>

    <!-- Loading State -->
    <div class="loading-state" id="loadingState" style="display:none;">
      <div class="spinner"></div>
      <p>Loading today's updates...</p>
    </div>

    <!-- Toast notification for auto-refresh -->
    <div class="toast" id="toast">
      <span class="toast-icon">🔔</span>
      <span class="toast-text" id="toastText">New updates available!</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
